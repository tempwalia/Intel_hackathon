<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Idea Intake Form</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			min-height: 100vh;
			padding: 20px;
		}
		.container {
			max-width: 900px;
			margin: 0 auto;
			background: white;
			border-radius: 12px;
			box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
			padding: 40px;
		}
		h1 {
			color: #333;
			margin-bottom: 10px;
			font-size: 28px;
		}
		.subtitle {
			color: #666;
			margin-bottom: 30px;
			font-size: 16px;
		}
		.section {
			margin-bottom: 40px;
		}
		.section h2 {
			color: #667eea;
			font-size: 18px;
			margin-bottom: 20px;
			border-bottom: 2px solid #667eea;
			padding-bottom: 10px;
		}
		.form-group {
			margin-bottom: 16px;
		}
		label {
			display: block;
			margin-bottom: 8px;
			color: #333;
			font-weight: 500;
			font-size: 14px;
		}
		input[type="text"],
		input[type="email"],
		input[type="number"],
		textarea,
		select {
			width: 100%;
			padding: 10px 12px;
			border: 1px solid #ddd;
			border-radius: 6px;
			font-size: 14px;
			font-family: inherit;
			transition: border-color 0.2s;
		}
		input[type="text"]:focus,
		input[type="email"]:focus,
		input[type="number"]:focus,
		textarea:focus,
		select:focus {
			outline: none;
			border-color: #667eea;
			box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
		}
		textarea {
			resize: vertical;
			min-height: 100px;
		}
		.form-row {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 20px;
		}
		@media (max-width: 600px) {
			.form-row {
				grid-template-columns: 1fr;
			}
		}
		.checkbox-group {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
			gap: 12px;
			margin-top: 10px;
		}
		.checkbox-item {
			display: flex;
			align-items: center;
		}
		input[type="checkbox"] {
			width: 18px;
			height: 18px;
			margin-right: 8px;
			cursor: pointer;
		}
		.checkbox-item label {
			margin: 0;
			cursor: pointer;
			font-weight: normal;
		}
		.button-group {
			display: flex;
			gap: 10px;
			margin-top: 30px;
		}
		button {
			padding: 12px 24px;
			border: none;
			border-radius: 6px;
			font-size: 16px;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.2s;
		}
		#submitBtn {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
			flex: 1;
		}
		#submitBtn:hover {
			transform: translateY(-2px);
			box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
		}
		#submitBtn:active {
			transform: translateY(0);
		}
		#resetBtn {
			background: #f0f0f0;
			color: #333;
			padding: 12px 24px;
		}
		#resetBtn:hover {
			background: #e0e0e0;
		}
		.message {
			padding: 16px 12px;
			border-radius: 6px;
			margin-bottom: 20px;
			display: none;
		}
		.message.success {
			background: #d4edda;
			color: #155724;
			border: 1px solid #c3e6cb;
			display: block;
		}
		.message.error {
			background: #f8d7da;
			color: #721c24;
			border: 1px solid #f5c6cb;
			display: block;
		}
		.summary {
			background: #f8f9fa;
			padding: 20px;
			border-radius: 6px;
			margin-top: 20px;
			display: none;
		}
		.summary h3 {
			color: #333;
			margin-bottom: 12px;
		}
		.summary pre {
			background: white;
			padding: 12px;
			border-radius: 6px;
			overflow-x: auto;
			font-size: 12px;
			line-height: 1.4;
			border: 1px solid #ddd;
		}
		.required {
			color: #e74c3c;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Idea Intake Form</h1>
		<p class="subtitle">Use this form to submit a new idea. Fill all sections marked with <span class="required">*</span> and press Submit.</p>
		
		<div id="message" class="message"></div>
		
		<form id="ideaForm">
			<!-- Section 1 -->
			<div class="section">
				<h2>Section 1: Idea Overview</h2>
				<div class="form-group">
					<label for="title">Title <span class="required">*</span></label>
					<input type="text" id="title" name="title" placeholder="e.g., URL Shortener Application">
				</div>
				<div class="form-group">
					<label for="description">Description <span class="required">*</span></label>
					<textarea id="description" name="description" placeholder="Enter a brief description of your project..."></textarea>
				</div>
				<div class="form-group">
					<label for="problem">Problem <span class="required">*</span></label>
					<textarea id="problem" name="problem" placeholder="Describe the problem your project solves..."></textarea>
				</div>
				<div class="form-group">
					<label for="outcome">Desired Outcome <span class="required">*</span></label>
					<textarea id="outcome" name="outcome" placeholder="What will users achieve?"></textarea>
				</div>
			</div>
			
			<!-- Section 2 -->
			<div class="section">
				<h2>Section 2: Technical Inputs</h2>
				<div class="form-row">
					<div class="form-group">
						<label for="language">Language / Primary Tech <span class="required">*</span></label>
						<input type="text" id="language" name="language" placeholder="e.g., Python">
					</div>
					<div class="form-group">
						<label for="complexity">Complexity <span class="required">*</span></label>
						<select id="complexity" name="complexity">
							<option value="">-- Select --</option>
							<option value="Low">Low</option>
							<option value="Medium">Medium</option>
							<option value="High">High</option>
						</select>
					</div>
				</div>
				<div class="form-group">
					<label for="approach">Approach / Algorithm <span class="required">*</span></label>
					<textarea id="approach" name="approach" placeholder="Explain how the solution works..."></textarea>
				</div>
				<div class="form-group">
					<label for="stack">Recommended Stack / Services <span class="required">*</span></label>
					<textarea id="stack" name="stack" placeholder="List technologies used..."></textarea>
				</div>
				<div class="form-group">
					<label for="boilerplate">
						<input type="checkbox" id="boilerplate" name="boilerplate_enabled">
						Enable Boilerplate / Scaffold (optional)
					</label>
				</div>
			</div>
			
			<!-- Section 3 -->
			<div class="section">
				<h2>Section 3: Resources & Skills</h2>
				<div class="form-row">
					<div class="form-group">
						<label for="devCount">Developer count (estimate) <span class="required">*</span></label>
						<input type="number" id="devCount" name="dev_count" min="1" max="100" value="1">
					</div>
					<div class="form-group">
						<label for="timeline">Estimated timeline <span class="required">*</span></label>
						<input type="text" id="timeline" name="timeline" placeholder="e.g., 2–5 days">
					</div>
				</div>
				<div class="form-group">
					<label>Required skills / roles <span class="required">*</span></label>
					<div class="checkbox-group">
						<div class="checkbox-item">
							<input type="checkbox" name="skills" value="Frontend">
							<label>Frontend</label>
						</div>
						<div class="checkbox-item">
							<input type="checkbox" name="skills" value="Backend">
							<label>Backend</label>
						</div>
						<div class="checkbox-item">
							<input type="checkbox" name="skills" value="ML">
							<label>ML</label>
						</div>
						<div class="checkbox-item">
							<input type="checkbox" name="skills" value="DevOps">
							<label>DevOps</label>
						</div>
						<div class="checkbox-item">
							<input type="checkbox" name="skills" value="QA">
							<label>QA</label>
						</div>
						<div class="checkbox-item">
							<input type="checkbox" name="skills" value="Data Engineer">
							<label>Data Engineer</label>
						</div>
						<div class="checkbox-item">
							<input type="checkbox" name="skills" value="Product">
							<label>Product</label>
						</div>
					</div>
				</div>
			</div>
			
			<!-- Section 4 -->
			<div class="section">
				<h2>Section 4: Approval</h2>
				<div class="form-group">
					<label for="manager">Manager / Approver (email or name) <span class="required">*</span></label>
					<input type="text" id="manager" name="manager" placeholder="e.g., Project Guide / Teacher">
				</div>
			</div>
			
			<!-- Buttons -->
			<div class="button-group">
				<button type="submit" id="submitBtn">Submit Idea</button>
				<button type="reset" id="resetBtn">Clear Form</button>
			</div>
		</form>
		
		<div id="summary" class="summary">
			<h3>✅ Submission Summary</h3>
			<pre id="summaryContent"></pre>
		</div>
	</div>
	
	<script>
		document.getElementById('ideaForm').addEventListener('submit', async function(e) {
			e.preventDefault();
			
			const formData = new FormData(this);
			const data = {
				title: formData.get('title'),
				description: formData.get('description'),
				problem: formData.get('problem'),
				outcome: formData.get('outcome'),
				language: formData.get('language'),
				approach: formData.get('approach'),
				stack: formData.get('stack'),
				complexity: formData.get('complexity'),
				boilerplate_enabled: formData.get('boilerplate_enabled') === 'on',
				dev_count: formData.get('dev_count'),
				skills: formData.getAll('skills'),
				timeline: formData.get('timeline'),
				manager: formData.get('manager'),
			};
			
			try {
				const response = await fetch('/api/submit', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
					},
					body: JSON.stringify(data)
				});
				
				const result = await response.json();
				const messageDiv = document.getElementById('message');
				
				if (response.ok) {
					messageDiv.className = 'message success';
					messageDiv.textContent = result.message + ` ID: ${result.id}`;
					
					document.getElementById('summaryContent').textContent = JSON.stringify(result.data, null, 2);
					document.getElementById('summary').style.display = 'block';
					
					// Clear form
					document.getElementById('ideaForm').reset();
					
					// Scroll to summary
					document.getElementById('summary').scrollIntoView({ behavior: 'smooth' });
				} else {
					messageDiv.className = 'message error';
					messageDiv.textContent = '❌ ' + result.message;
					document.getElementById('summary').style.display = 'none';
				}
			} catch (error) {
				const messageDiv = document.getElementById('message');
				messageDiv.className = 'message error';
				messageDiv.textContent = '❌ Error submitting form. Please try again.';
				console.error('Error:', error);
			}
		});
	</script>
</body>
</html>
